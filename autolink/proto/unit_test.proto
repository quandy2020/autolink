syntax = "proto3";

package autolink.proto;

message UnitTest {
  string class_name = 1;
  string case_name = 2;
}

message Chatter {
  uint64 timestamp = 1;
  uint64 lidar_timestamp = 2;
  uint64 seq = 3;
  bytes content = 4;
}

message ChatterBenchmark {
  uint64 stamp = 1;
  uint64 seq = 2;
  string content = 3;
}


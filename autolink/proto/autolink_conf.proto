syntax = "proto3";

package autolink.proto;

import "scheduler_conf.proto";
import "transport_conf.proto";
import "run_mode_conf.proto";
import "perf_conf.proto";

message AutolinkConfig {
  SchedulerConf scheduler_conf = 1;
  TransportConf transport_conf = 2;
  RunModeConf run_mode_conf = 3;
  PerfConf perf_conf = 4;
}

syntax = "proto3";

package autolink.proto;

import "role_attributes.proto";

enum ChangeType {
  CHANGE_UNSPECIFIED = 0;
  CHANGE_NODE = 1;
  CHANGE_CHANNEL = 2;
  CHANGE_SERVICE = 3;
  CHANGE_PARTICIPANT = 4;
}

enum OperateType {
  OPT_UNSPECIFIED = 0;
  OPT_JOIN = 1;
  OPT_LEAVE = 2;
}

enum RoleType {
  ROLE_UNSPECIFIED = 0;
  ROLE_NODE = 1;
  ROLE_WRITER = 2;
  ROLE_READER = 3;
  ROLE_SERVER = 4;
  ROLE_CLIENT = 5;
  ROLE_PARTICIPANT = 6;
}

message ChangeMsg {
  uint64 timestamp = 1;
  ChangeType change_type = 2;
  OperateType operate_type = 3;
  RoleType role_type = 4;
  RoleAttributes role_attr = 5;
}

syntax = "proto3";

package autolink.examples;

message SamplesTest1 {
  string class_name = 1;
  string case_name = 2;
}

message Chatter {
  uint64 timestamp = 1;
  uint64 lidar_timestamp = 2;
  uint64 seq = 3;
  bytes content = 4;
}

message Driver {
  string content = 1;
  uint64 msg_id = 2;
  uint64 timestamp = 3;
}

message SimpleMessageAction {
    message Goal
    {
        string text = 1;
    }

    message Feedback
    {
        int32 index = 1;
    }

    message Result
    {
        bool success = 1;
    }

    // Goal
    Goal goal = 1;

    // Feedback
    Feedback feedback = 2;

    // Result
    Result result = 3;
}